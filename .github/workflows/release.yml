name: Release Resume

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium system dependencies
        run: npx puppeteer browsers install chrome

      - name: Build resume (HTML + PDF)
        run: node build.js

      - name: Upload resume assets to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} output/resume.pdf
          gh release upload ${{ github.event.release.tag_name }} output/resume.html
        env:
          GH_TOKEN: ${{ github.token }}
